<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Visualizer Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'MS Gothic', 'Yu Gothic', monospace; }
#canvas { display: block; width: 100vw; height: 100vh; }

#ui {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(6px);
}

button {
  padding: 5px 14px;
  background: #1a1a1a;
  color: #aaa;
  border: 1px solid #3a3a3a;
  border-radius: 3px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
}
button:hover { background: #2a2a2a; color: #ddd; }
button.active { background: #0d3a5c; border-color: #3af; color: #7df; }
button:disabled { opacity: 0.35; cursor: default; }

#progress {
  flex: 1;
  height: 3px;
  background: #2a2a2a;
  border-radius: 2px;
  overflow: hidden;
}
#progress-inner {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #3af, #f93);
}

#info {
  font-size: 12px;
  color: #666;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
#info-mora { font-size: 22px; color: #eee; min-width: 28px; text-align: center; }
#info-word { color: #88aaff; font-size: 13px; }
#info-time { color: #555; }

#status {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: #444;
  font-size: 13px;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="status">Loading…</div>

<div id="ui">
  <button id="btn-play" disabled>▶ Play</button>
  <div style="display:flex;gap:4px">
    <button class="mode-btn active" data-mode="0">Fluid</button>
    <button class="mode-btn"        data-mode="1">Glitch</button>
    <button class="mode-btn"        data-mode="2">Text Matrix</button>
  </div>
  <div id="progress"><div id="progress-inner"></div></div>
  <div id="info">
    <span id="info-mora"></span>
    <span id="info-word"></span>
    <span id="info-time">0.0s</span>
  </div>
</div>

<script src="visualizer.js"></script>
</body>
</html>
