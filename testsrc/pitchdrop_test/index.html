<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ピッチドロップ テスト</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #1a1a1a; color: #eee; }
    button { padding: 6px 14px; margin: 4px; }
    label { display: block; margin-top: 10px; }
    #status { margin-top: 14px; color: #aaa; font-size: 0.9em; }

    #btn-drop {
      margin-top: 14px;
      padding: 10px 28px;
      font-size: 1.1em;
      background: #333;
      color: #eee;
      border: 2px solid #555;
      border-radius: 6px;
      cursor: pointer;
    }
    #btn-drop.active {
      background: #7b1010;
      border-color: #ff4444;
      color: #fff;
    }
  </style>
</head>
<body>
  <h3 style="margin:0 0 12px">ピッチドロップ テスト</h3>

  <button id="btn-play">▶ 再生</button>
  <button id="btn-stop" disabled>■ 停止</button>

  <label>
    ピッチドロップ 時間:
    <strong id="drop-dur-value">2.0</strong> 秒
    <input type="range" id="drop-duration" min="0.3" max="8.0" step="0.1" value="2.0" style="width:200px">
  </label>

  <br>
  <button id="btn-drop">ピッチドロップ OFF</button>

  <div id="status">待機中</div>

  <script src="test.js"></script>
</body>
</html>
